title: Enterprise Multi-Agent Architecture
description: Bajaj — Enterprise AI Agent Architecture Reference · Vineet Kaul · Microsoft

# Local development — use 'theme'
# For GitHub Pages deployment, swap to: remote_theme: just-the-docs/just-the-docs@v0.10.0
theme: just-the-docs

# Site URL — update this when publishing to GitHub Pages
# url: https://<your-github-username>.github.io
# baseurl: "/<repo-name>"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Navigation
nav_sort: order   # use nav_order in front matter

# Colours
color_scheme: bajaj

# Footer
footer_content: "kaul-vineet · Principal PM Architect · Microsoft"

# Suppress Sass deprecation warnings from just-the-docs gem (darken/lighten)
sass:
  silence_deprecations:
    - color-functions
    - import
    - global-builtin

# Markdown
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.bak"
  - "*.py"
